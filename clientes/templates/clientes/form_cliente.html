{% extends 'clientes/base.html' %}

{% block content %}

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h4 class="mb-0">
{% if cliente %}
Editar Cliente
{% else %}
Cadastrar Cliente
{% endif %}
</h4>
</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="row">

{% for field in form %}

<div class="col-md-4 mb-3">

<label class="form-label">
{{ field.label }}
</label>

{{ field }}

{% if field.errors %}
<div class="text-danger">
{{ field.errors }}
</div>
{% endif %}

</div>

{% endfor %}

</div>

<button class="btn btn-success">
Salvar
</button>

<a href="{% url 'lista_clientes' %}" class="btn btn-secondary">
Voltar
</a>

</form>

</div>

</div>

</div>

{% endblock %}
