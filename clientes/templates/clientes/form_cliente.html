<!DOCTYPE html>
<html>
<head>

<title>Editar Cliente</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h1>Editar Cliente</h1>

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-4">
<label>Nome</label>
{{ form.nome }}
</div>

<div class="col-md-4">
<label>Telefone</label>
{{ form.telefone }}
</div>

<div class="col-md-4">
<label>Email</label>
{{ form.email }}
</div>

</div>

<br>

<div class="row">

<div class="col-md-4">
<label>Endereço</label>
{{ form.endereco }}
</div>

<div class="col-md-3">
<label>Cidade</label>
{{ form.cidade }}
</div>

<div class="col-md-2">
<label>Estado</label>
{{ form.estado }}
</div>

<div class="col-md-3">
<label>CEP</label>
{{ form.cep }}
</div>

</div>

<br>

<div class="row">

<div class="col-md-4">
<label>Data de Nascimento</label>
{{ form.data_nascimento }}
</div>

</div>

<br>

<button class="btn btn-success">Salvar Alterações</button>

<a href="/" class="btn btn-secondary">Voltar</a>

</form>

</body>
</html>
