<!DOCTYPE html>
<html>

<head>

<title>ProjetoX - Sistema de Clientes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

{% load static %}

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">

<div class="container">

<a class="navbar-brand d-flex align-items-center" href="#">


<strong>GRACE CLEAR</strong>

</a>

<div>
    <span class="text-white me-3">
    Bem-vindo, {{ request.user.username }}
</span>

<a href="{% url 'cadastrar_cliente' %}" class="btn btn-success btn-sm">
Cadastrar
</a>

{% if request.user.is_staff %}
<a href="{% url 'lista_clientes' %}" class="btn btn-primary btn-sm">
Clientes
</a>
{% endif %}

<a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
Sair
</a>

</div>

</div>

</nav>


<div class="container mt-4">

{% if messages %}
{% for message in messages %}
<div class="alert alert-success">
{{ message }}
</div>
{% endfor %}
{% endif %}

{% block content %}
{% endblock %}

</div>

</body>

</html>
